<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LimPossible - 디지털 명함</title>
<meta property="og:title" content="LimPossible | AI 1인 유니콘 빌더">
<meta property="og:description" content="대체 될 것인가? 대체 할 것인가? - 하네스 엔지니어링">
<meta property="og:image" content="https://limkipyo.github.io/Limpossible/og-v1.png">
<meta property="og:url" content="https://limkipyo.github.io/Limpossible/">
<meta property="og:type" content="website">
<meta property="og:site_name" content="LimPossible">
<meta property="og:locale" content="ko_KR">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --purple-900: #1a0a2e;
  --purple-800: #2d1454;
  --purple-700: #4c1d95;
  --purple-600: #6d28d9;
  --purple-500: #7c3aed;
  --purple-400: #a78bfa;
  --purple-300: #c4b5fd;
  --black-deep: #08060e;
  --black-card: #0e0a18;
  --black-surface: #150f24;
  --gray-100: #f0edf5;
  --gray-300: #c8c2d6;
  --gray-500: #8b83a0;
  --gray-600: #6b6280;
  --gray-700: #4a4360;
}

body {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--black-deep);
  font-family: 'Noto Sans KR', sans-serif;
  overflow-x: hidden;
  padding: 16px;
}

/* 배경 그리드 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: 
    linear-gradient(rgba(124, 58, 237, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124, 58, 237, 0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* 배경 글로우 오브 */
body::after {
  content: '';
  position: fixed;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(124, 58, 237, 0.08) 0%, transparent 70%);
  pointer-events: none;
}

.card-wrapper {
  perspective: 1200px;
  width: 100%;
  max-width: 440px;
}

.card {
  width: 100%;
  background: linear-gradient(145deg, var(--black-surface) 0%, var(--black-card) 50%, #0b0714 100%);
  border: 1px solid rgba(124, 58, 237, 0.2);
  border-radius: 16px;
  padding: 36px 32px 28px;
  position: relative;
  overflow: hidden;
  box-shadow: 
    0 0 100px rgba(124, 58, 237, 0.08),
    0 0 40px rgba(109, 40, 217, 0.04),
    0 20px 60px rgba(0, 0, 0, 0.6),
    inset 0 1px 0 rgba(255, 255, 255, 0.04);
  animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(30px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* 상단 글로우 라인 */
.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 32px;
  width: 80px;
  height: 2px;
  background: linear-gradient(90deg, var(--purple-600), var(--purple-400), transparent);
  animation: glowLine 2s ease-in-out infinite alternate;
}

@keyframes glowLine {
  from { opacity: 0.6; width: 80px; }
  to { opacity: 1; width: 120px; }
}

/* 코너 장식 */
.card::after {
  content: '';
  position: absolute;
  top: 12px;
  right: 12px;
  width: 8px;
  height: 8px;
  border-top: 1.5px solid rgba(124, 58, 237, 0.4);
  border-right: 1.5px solid rgba(124, 58, 237, 0.4);
}

.corner-bl {
  position: absolute;
  bottom: 12px;
  left: 12px;
  width: 8px;
  height: 8px;
  border-bottom: 1.5px solid rgba(124, 58, 237, 0.25);
  border-left: 1.5px solid rgba(124, 58, 237, 0.25);
}

/* 이름 */
.name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  font-weight: 700;
  color: var(--gray-100);
  letter-spacing: -0.5px;
  margin-bottom: 6px;
  animation: typeIn 0.6s 0.3s both;
}

@keyframes typeIn {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}

.name span {
  background: linear-gradient(135deg, var(--purple-500), var(--purple-400));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* 직함 */
.title-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
  animation: fadeUp 0.5s 0.5s both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.title-row .role {
  font-size: 12px;
  font-weight: 500;
  color: var(--purple-400);
  letter-spacing: 0.5px;
}

.title-row .divider {
  width: 1px;
  height: 12px;
  background: rgba(124, 58, 237, 0.2);
}

.title-row .brand {
  font-size: 11px;
  color: var(--gray-500);
  font-weight: 400;
}

/* 구분선 */
.sep {
  height: 1px;
  background: linear-gradient(90deg, rgba(124, 58, 237, 0.3), rgba(124, 58, 237, 0.08), transparent);
  margin-bottom: 20px;
}

/* 슬로건 */
.slogan {
  font-size: 18px;
  font-weight: 900;
  color: var(--gray-300);
  line-height: 1.5;
  margin-bottom: 22px;
  animation: fadeUp 0.5s 0.7s both;
}

.slogan .highlight {
  background: linear-gradient(90deg, var(--purple-500), var(--purple-300));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* 서비스 그리드 */
.services {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 22px;
}

.service {
  background: rgba(124, 58, 237, 0.03);
  border: 1px solid rgba(124, 58, 237, 0.08);
  border-radius: 10px;
  padding: 14px 12px;
  transition: all 0.3s ease;
  cursor: default;
  animation: fadeUp 0.5s calc(0.9s + var(--i) * 0.1s) both;
}

.service:hover {
  background: rgba(124, 58, 237, 0.08);
  border-color: rgba(124, 58, 237, 0.25);
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(124, 58, 237, 0.1);
}

.service .prompt {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--purple-500);
  margin-bottom: 4px;
}

.service .svc-name {
  font-size: 12px;
  font-weight: 700;
  color: var(--gray-300);
  margin-bottom: 4px;
  line-height: 1.3;
}

.service .svc-sub {
  font-size: 11px;
  color: var(--gray-500);
  font-weight: 500;
}

/* 하단 구분선 */
.sep-bottom {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(124, 58, 237, 0.12), transparent);
  margin-bottom: 18px;
}

/* 연락처 */
.contact {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  animation: fadeUp 0.5s 1.3s both;
}

.contact-left {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.contact-left a, .contact-left span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--gray-500);
  text-decoration: none;
  transition: color 0.2s;
}

.contact-left a:hover {
  color: var(--purple-400);
}

.contact-left .kmong {
  color: var(--purple-500);
  font-weight: 700;
}

.contact-right {
  text-align: right;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.contact-right p {
  font-size: 10px;
  color: var(--gray-600);
  line-height: 1.5;
}

/* 노이즈 오버레이 */
.noise {
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  border-radius: 16px;
}

/* ===== 반응형 ===== */

/* 작은 모바일 (갤럭시 S 시리즈 등 360px~) */
@media (max-width: 480px) {
  body {
    padding: 12px;
    align-items: flex-start;
    padding-top: 24px;
    overflow-y: auto;
  }

  .card {
    padding: 28px 20px 22px;
    border-radius: 14px;
  }

  .card::before {
    left: 20px;
  }

  .name {
    font-size: 24px;
  }

  .title-row .role {
    font-size: 11px;
  }

  .title-row .brand {
    font-size: 10px;
  }

  .slogan {
    font-size: 16px;
    margin-bottom: 18px;
  }

  .services {
    gap: 8px;
    margin-bottom: 18px;
  }

  .service {
    padding: 12px 10px;
    border-radius: 8px;
  }

  .service .prompt {
    font-size: 10px;
  }

  .service .svc-name {
    font-size: 11px;
  }

  .service .svc-sub {
    font-size: 10px;
  }

  .contact-left a, .contact-left span {
    font-size: 10px;
  }

  .contact-right p {
    font-size: 9px;
  }
}

/* 아주 작은 화면 (320px 이하) */
@media (max-width: 340px) {
  .card {
    padding: 24px 16px 20px;
  }

  .name {
    font-size: 22px;
  }

  .slogan {
    font-size: 15px;
  }

  .services {
    gap: 6px;
  }

  .service {
    padding: 10px 8px;
  }

  .service .svc-name {
    font-size: 10px;
  }

  .contact {
    flex-direction: column;
    gap: 12px;
    align-items: flex-start;
  }

  .contact-right {
    text-align: left;
  }
}
</style>
</head>
<body>
<div class="card-wrapper">
  <div class="card">
    <div class="noise"></div>
    <div class="corner-bl"></div>
    
    <div class="name">Lim<span>Possible</span></div>
    
    <div class="title-row">
      <span class="role">AI 1인 유니콘 빌더</span>
      <span class="divider"></span>
      <span class="brand">하네스 엔지니어링</span>
    </div>
    
    <div class="sep"></div>
    
    <div class="slogan">
      <span class="highlight">대체</span> 될 것인가?<br>
      <span class="highlight">대체</span> 할 것인가?
    </div>
    
    <div class="services">
      <div class="service" style="--i:0">
        <div class="prompt">&gt;_</div>
        <div class="svc-name">Claude Code</div>
        <div class="svc-sub">시키는 법</div>
      </div>
      <div class="service" style="--i:1">
        <div class="prompt">&gt;_</div>
        <div class="svc-name">업무 자동화</div>
        <div class="svc-sub">맡기는 법</div>
      </div>
      <div class="service" style="--i:2">
        <div class="prompt">&gt;_</div>
        <div class="svc-name">1인 기업 설계</div>
        <div class="svc-sub">버는 법</div>
      </div>
    </div>
    
    <div class="sep-bottom"></div>
    
    <div class="contact">
      <div class="contact-left">
        <span>010-9026-9584</span>
        <a href="mailto:limkipyo@gmail.com">limkipyo@gmail.com</a>
        <a href="https://kmong.com/@LimPossible" class="kmong">kmong.com/@LimPossible</a>
      </div>
      <div class="contact-right">
        <p>비개발자 눈높이로 바라봅니다</p>
        <p>실무 경력으로 디테일을 잡습니다</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
